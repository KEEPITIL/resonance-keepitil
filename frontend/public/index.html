<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FF0077" />
    <meta name="description" content="RESONANCE — California's premier EDM ticketing and DJ booking marketplace. 18+ events, live music, underground raves." />
    <meta property="og:title" content="RESONANCE — EDM Events & DJ Booking" />
    <meta property="og:description" content="Discover EDM events, buy tickets, and book DJs across California." />
    <meta property="og:type" content="website" />
    <title>RESONANCE ◈ EDM Events & DJ Booking</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Bebas Neue: flyer-style display headings (matches KEEPITIL flyer typography) -->
    <!-- Orbitron: UI/brand headings · Space Mono: body/mono -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;500;600;700;800;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body {
        background: #080808;
        color: #ffffff;
        font-family: 'Space Mono', monospace;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #111; }
      ::-webkit-scrollbar-thumb { background: linear-gradient(#FF0077, #9900FF); border-radius: 3px; }
    </style>
  </head>

    <noscript>You need to enable JavaScript to run RESONANCE.</noscript>
